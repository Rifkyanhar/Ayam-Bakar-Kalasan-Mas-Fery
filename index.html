<style>
:root{
  --yellow:#F2A900;
  --yellow-deep:#D98E00;
  --cream:#FFF7E6;
  --green:#1E6B3C;
  --green-deep:#134A29;
  --red:#B8322A;
  --ink:#2A2118;
  --paper:#FFFDF8;
  --line:#E8DCC0;
  --gray:#8A7F6C;
  --radius:14px;
  --shadow:0 4px 18px rgba(43,33,15,0.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
}
h1,h2,h3,.brand{font-family:'Baloo 2','Inter',sans-serif;}
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--paper);box-shadow:0 0 40px rgba(0,0,0,0.06);position:relative;padding-bottom:24px;}
#app.wide{max-width:960px;}

/* Header */
.topbar{
  background:linear-gradient(135deg,var(--green) 0%, var(--green-deep) 100%);
  color:#fff;padding:18px 20px 22px;position:relative;overflow:hidden;
}
.topbar::after{content:"";position:absolute;right:-40px;top:-40px;width:140px;height:140px;background:rgba(242,169,0,0.25);border-radius:50%;}
.topbar .eyebrow{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.85;font-weight:600;}
.topbar h1{margin:2px 0 0;font-size:22px;font-weight:700;}
.topbar .sub{font-size:13px;opacity:0.9;margin-top:2px;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.back-btn{background:rgba(255,255,255,0.18);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.back-btn:active{background:rgba(255,255,255,0.32);}

.content{padding:20px;}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h3{margin:0 0 8px;font-size:16px;color:var(--green-deep);}
.muted{color:var(--gray);font-size:13px;}
.pill{display:inline-block;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600;}
.pill.yellow{background:#FDF0D5;color:var(--yellow-deep);}
.pill.green{background:#E4F3E9;color:var(--green-deep);}
.pill.red{background:#FBE7E5;color:var(--red);}
.pill.gray{background:#F0EDE5;color:var(--gray);}

.btn{
  display:block;width:100%;padding:14px 16px;border-radius:12px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;
  transition:transform .05s ease;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:disabled{background:#C9C2B3;cursor:not-allowed;}
.btn-outline{background:#fff;color:var(--green-deep);border:2px solid var(--green);}
.btn-yellow{background:var(--yellow);color:#3A2600;}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:9px 12px;font-size:13px;border-radius:9px;}
.btn-ghost{background:transparent;color:var(--green-deep);border:1px dashed var(--line);}

.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.table-chip{
  background:var(--cream);border:1.5px solid var(--line);border-radius:12px;
  padding:14px 6px;text-align:center;cursor:pointer;font-weight:700;color:var(--green-deep);font-size:14px;
}
.table-chip:active{background:#FDF0D5;border-color:var(--yellow);}
.table-chip.special{background:var(--green-deep);color:#fff;border-color:var(--green-deep);}

.type-card{
  display:flex;align-items:center;gap:12px;border:2px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;cursor:pointer;background:#fff;
}
.type-card .icon{font-size:26px;}
.type-card b{display:block;font-size:15px;}
.type-card span{font-size:12.5px;color:var(--gray);}
.type-card.disabled{opacity:0.5;cursor:not-allowed;}

.menu-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.menu-item-disabled{opacity:0.55;filter:grayscale(0.4);}
.menu-item:last-child{border-bottom:none;}
.menu-item .emoji{font-size:34px;width:48px;text-align:center;flex-shrink:0;}
.menu-item .info{flex:1;min-width:0;}
.menu-item .info b{font-size:14.5px;}
.menu-item .info .desc{font-size:12.5px;color:var(--gray);}
.menu-item .price{font-size:13.5px;color:var(--red);font-weight:700;margin-top:2px;}
.qty-box{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--green);background:#fff;color:var(--green-deep);font-weight:700;cursor:pointer;font-size:15px;line-height:1;}
.qty-btn:active{background:var(--cream);}
.qty-num{min-width:20px;text-align:center;font-weight:700;}
.note-input{
  width:100%;margin-top:8px;padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;
  font-size:13px;font-family:inherit;background:var(--cream);
}

.category-tabs{display:flex;gap:8px;margin-bottom:12px;}
.category-tabs button{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:600;font-size:13px;cursor:pointer;color:var(--gray);}
.category-tabs button.active{background:var(--green);border-color:var(--green);color:#fff;}

.cart-fab{
  position:sticky;bottom:0;left:0;right:0;background:var(--green-deep);color:#fff;
  padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
  border-radius:16px 16px 0 0;margin-top:12px;
}
.cart-fab b{font-size:15px;}
.cart-fab .go{background:var(--yellow);color:#3A2600;padding:8px 16px;border-radius:9px;font-weight:700;border:none;font-size:13.5px;cursor:pointer;}

input[type=text], input[type=tel], input[type=number], textarea, select{
  width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;
  font-family:inherit;background:#fff;color:var(--ink);
}
textarea{resize:vertical;min-height:56px;}
label{font-size:13px;font-weight:600;color:var(--ink);display:block;margin:10px 0 5px;}
.field{margin-bottom:4px;}

.upload-box{
  border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;cursor:pointer;
  color:var(--gray);font-size:13px;background:var(--cream);
}
.upload-preview{width:100%;border-radius:10px;margin-top:10px;max-height:220px;object-fit:contain;background:#f5f0e2;}

.pay-option{display:flex;align-items:center;gap:12px;border:2px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px;cursor:pointer;}
.pay-option.selected{border-color:var(--green);background:#F3FAF5;}
.pay-option .icon{font-size:22px;}
.pay-option b{font-size:14px;}
.pay-option span{font-size:12px;color:var(--gray);}

.banner{border-radius:12px;padding:13px 14px;font-size:13.5px;margin-bottom:12px;line-height:1.5;}
.banner.warn{background:#FDF3E3;border:1px solid #F3D89A;color:#7A5300;}
.banner.error{background:#FBE7E5;border:1px solid #F0B4AD;color:#8A241C;}
.banner.ok{background:#E4F3E9;border:1px solid #A9D9BC;color:var(--green-deep);}

.queue-hero{text-align:center;padding:26px 10px 10px;}
.queue-num{font-family:'Baloo 2';font-size:56px;font-weight:800;color:var(--green-deep);letter-spacing:2px;}
.status-track{display:flex;justify-content:space-between;margin:22px 0 6px;position:relative;}
.status-track::before{content:"";position:absolute;top:14px;left:8%;right:8%;height:3px;background:var(--line);z-index:0;}
.status-step{flex:1;text-align:center;position:relative;z-index:1;}
.status-dot{width:30px;height:30px;border-radius:50%;background:#fff;border:3px solid var(--line);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.status-step.done .status-dot{background:var(--green);border-color:var(--green);color:#fff;}
.status-step.current .status-dot{background:var(--yellow);border-color:var(--yellow-deep);color:#3A2600;}
.status-step small{font-size:11px;color:var(--gray);display:block;}
.status-step.done small, .status-step.current small{color:var(--ink);font-weight:600;}

/* Role select / home */
.role-hero{background:linear-gradient(160deg,var(--yellow) 0%, var(--yellow-deep) 100%);padding:34px 20px 60px;text-align:center;color:#3A2600;position:relative;}
.role-hero .chicken{font-size:44px;}
.role-hero h1{margin:6px 0 0;font-size:24px;}
.role-hero p{font-size:13px;opacity:0.85;margin:6px 0 0;}
.role-cards{margin:-40px 18px 0;position:relative;z-index:2;}
.role-card{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:12px;cursor:pointer;border:1px solid var(--line);}
.role-card .icon{font-size:30px;width:44px;text-align:center;}
.role-card b{font-size:15px;display:block;}
.role-card span{font-size:12.5px;color:var(--gray);}

/* Kitchen & Cashier dashboards */
.dash-header{display:flex;justify-content:space-between;align-items:center;background:var(--green-deep);color:#fff;padding:16px 20px;}
.dash-header h2{margin:0;font-size:18px;}
.dash-tabs{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;}
.dash-tabs button{flex:1;padding:12px 6px;background:none;border:none;font-weight:600;color:var(--gray);font-size:13px;cursor:pointer;border-bottom:3px solid transparent;}
.dash-tabs button.active{color:var(--green-deep);border-bottom-color:var(--green);}
.order-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 20px;box-shadow:var(--shadow);}
.order-card .row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.order-card .qnum{font-family:'Baloo 2';font-size:22px;font-weight:800;color:var(--green-deep);}
.order-card .meta{font-size:12px;color:var(--gray);}
.order-items{font-size:13.5px;margin:8px 0;}
.order-items div{padding:3px 0;border-bottom:1px dashed var(--line);}
.order-items div:last-child{border-bottom:none;}
.note-tag{background:#FDF0D5;color:#7A5300;font-size:11.5px;padding:2px 6px;border-radius:6px;margin-left:4px;}
.action-row{display:flex;gap:8px;margin-top:10px;}
.action-row .btn{flex:1;}
.proof-thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer;}

.qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;}
.qr-cell{border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;background:#fff;}
.qr-cell b{display:block;margin-top:6px;font-size:13px;}
.qr-cell canvas, .qr-cell img{margin:0 auto;}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px;border:1px solid var(--line);border-radius:12px;margin:14px 20px;background:#fff;}
.switch{position:relative;width:46px;height:26px;}
.switch input{display:none;}
.slider{position:absolute;inset:0;background:#D8D0BE;border-radius:20px;cursor:pointer;transition:.2s;}
.slider::before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
input:checked + .slider{background:var(--green);}
input:checked + .slider::before{transform:translateX(20px);}

.empty-state{text-align:center;padding:50px 20px;color:var(--gray);}
.empty-state .em{font-size:40px;display:block;margin-bottom:10px;}

@media print{
  body *{visibility:hidden;}
  .printable, .printable *{visibility:visible;}
  .printable{position:absolute;top:0;left:0;width:100%;}
}
.hidden{display:none !important;}
.lightbox-overlay{
  position:fixed;inset:0;background:rgba(10,8,4,0.94);z-index:999;
  display:flex;align-items:center;justify-content:center;padding:20px;
  overflow:auto;touch-action:pinch-zoom;
}
.lightbox-img{max-width:100%;max-height:none;width:100%;border-radius:8px;background:#fff;}
.lightbox-close{position:fixed;top:16px;right:16px;z-index:1000;width:38px;height:38px;font-size:18px;background:rgba(255,255,255,0.15);}
.lightbox-hint{position:fixed;top:18px;left:16px;color:#fff;font-size:12.5px;opacity:0.85;z-index:1000;background:rgba(255,255,255,0.12);padding:6px 10px;border-radius:8px;}
.file-input-vh{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}
a{color:var(--green-deep);}
.footer-note{text-align:center;font-size:11.5px;color:var(--gray);padding:14px 20px 0;}

/* Beranda (customer home dashboard) */
.beranda-top{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--green-deep);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:5;
}
.beranda-brand{font-family:'Baloo 2';font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.bell-btn{position:relative;background:rgba(255,255,255,0.15);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:17px;cursor:pointer;}
.bell-dot{position:absolute;top:6px;right:7px;width:9px;height:9px;background:var(--red);border-radius:50%;border:1.5px solid var(--green-deep);}
.beranda-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
.beranda-action{
  background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 8px;
  text-align:center;cursor:pointer;box-shadow:var(--shadow);
}
.beranda-action .icon{font-size:30px;margin-bottom:8px;}
.beranda-action b{font-size:12.5px;display:block;line-height:1.3;}
.staff-link{text-align:center;font-size:12px;color:var(--gray);margin-top:22px;}

/* PIN gate screens */
.pin-screen{min-height:100vh;background:#181818;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.pin-logo{font-size:56px;margin-bottom:6px;}
.pin-title{color:var(--yellow);font-family:'Baloo 2';font-size:24px;margin:6px 0 0;}
.pin-sub{color:#999;font-size:13px;margin:4px 0 28px;}
.pin-card{background:#242424;border:1px solid #3a3a3a;border-radius:16px;padding:22px;width:100%;max-width:320px;box-sizing:border-box;}
.pin-label{color:#ccc;font-size:13px;display:block;margin-bottom:10px;text-align:left;}
.pin-input{
  width:100%;padding:14px;border-radius:10px;border:1.5px solid #3a3a3a;background:#181818;color:#fff;
  font-size:26px;text-align:center;letter-spacing:14px;font-weight:700;box-sizing:border-box;
}
.pin-back{color:#888;font-size:12.5px;margin-top:18px;display:inline-block;}

/* Camera scanner */
.scan-video-wrap{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;}
.scan-video-wrap video{width:100%;display:block;}
.scan-frame{position:absolute;inset:12%;border:3px solid var(--yellow);border-radius:16px;pointer-events:none;}

</style>
</head>

<script>
/* ============ CONFIG ============ */
const RESTO = { name: "Ayam Bakar & Goreng Kalasan Mas Fery", lat: -6.1820389, lng: 106.6344833, wa: "085773144582", addr: "Jl. Soleh Ali No. 3 Kavling Pasar Anyar" };
const GEOFENCE_TOLERANCE_M = 10;
const TABLE_COUNT = 30;

const MENU = [
  { id:"u1", cat:"utama", emoji:"🍗", name:"Ayam Bakar/Goreng", desc:"Menu utama, tanpa nasi", price:19000 },
  { id:"u2", cat:"utama", emoji:"🍲", name:"Sop Iga", desc:"Sop iga sapi hangat", price:27000 },
  { id:"u3", cat:"utama", emoji:"🍲", name:"Sop Iga Bakar", desc:"Sop iga sapi bakar", price:30000 },
  { id:"u4", cat:"utama", emoji:"🥬", name:"Ca Kangkung", desc:"Cah kangkung segar", price:15000 },
  { id:"u5", cat:"utama", emoji:"🥬", name:"Ca Toge", desc:"Cah toge segar", price:15000 },
  { id:"s1", cat:"sterofom", emoji:"🍱", name:"Paket 1", desc:"Nasi + Ayam", price:24000 },
  { id:"s2", cat:"sterofom", emoji:"🍱", name:"Paket 2", desc:"Nasi + Ayam + Tahu/Tempe", price:27000 },
  { id:"s3", cat:"sterofom", emoji:"🍱", name:"Paket 3", desc:"Nasi + Ayam + Sayur Asem", price:27000 },
  { id:"s4", cat:"sterofom", emoji:"🍱", name:"Paket 4", desc:"Nasi + Ayam + Tahu + Tempe", price:29000 },
  { id:"s5", cat:"sterofom", emoji:"🍱", name:"Paket 5", desc:"Nasi + Ayam + Tahu + Tempe + Sayur Asem", price:32000 },
  { id:"s6", cat:"sterofom", emoji:"🍱", name:"Paket 6", desc:"Nasi + Ayam + Tahu/Tempe + Sayur Asem", price:30000 },
  { id:"p1", cat:"piring", emoji:"🍛", name:"Paket 1", desc:"Nasi + Ayam", price:27000 },
  { id:"p2", cat:"piring", emoji:"🍛", name:"Paket 2", desc:"Nasi + Ayam + Tahu/Tempe", price:30000 },
  { id:"p3", cat:"piring", emoji:"🍛", name:"Paket 3", desc:"Nasi + Ayam + Sayur Asem", price:30000 },
  { id:"p4", cat:"piring", emoji:"🍛", name:"Paket 4", desc:"Nasi + Ayam + Tahu + Tempe", price:32000 },
  { id:"p5", cat:"piring", emoji:"🍛", name:"Paket 5", desc:"Nasi + Ayam + Tahu + Tempe + Sayur Asem", price:35000 },
  { id:"p6", cat:"piring", emoji:"🍛", name:"Paket 6", desc:"Nasi + Ayam + Tahu/Tempe + Sayur Asem", price:33000 },
];

/* ============ FIREBASE SETUP ============ */
/* 1) Buka https://console.firebase.google.com -> Add project (gratis).
   2) Di project itu, aktifkan "Realtime Database" (mode test dulu untuk development).
   3) Buka Project Settings -> General -> "Your apps" -> tambah Web App -> copy config di bawah ini.
   4) Tempel config kamu menggantikan placeholder ini, lalu simpan ulang file & upload ke GitHub/VPS. */
const firebaseConfig = {
  apiKey: "AIzaSyBaizb6QqUyvGIdzNn10c40CjNTVLP3-Xo",
  authDomain: "ayam-bakar-kalasan-mas-fery.firebaseapp.com",
  databaseURL: "https://ayam-bakar-kalasan-mas-fery-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ayam-bakar-kalasan-mas-fery",
  storageBucket: "ayam-bakar-kalasan-mas-fery.firebasestorage.app",
  messagingSenderId: "259635639789",
  appId: "1:259635639789:web:74a06a46083f146bf863e4"
};
let db = null;
let auth = null;
let firebaseReady = false;
/* Fixed staff accounts — create these in Firebase Console > Authentication >
   Users (owner chooses the actual passwords there). The email doesn't need
   to be a real inbox, Firebase just needs the format. */
const DAPUR_EMAIL = 'dapur@kalasanmasfery.app';
const KASIR_EMAIL = 'kasir@kalasanmasfery.app';
let currentAuthUser = null;
let authReady = false;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  auth = firebase.auth();
  firebaseReady = true;
}catch(e){
  console.warn('Firebase belum dikonfigurasi — tempel config Firebase kamu di firebaseConfig.', e);
}

/* ============ STORAGE HELPERS (Firebase Realtime Database) ============ */
/* cache is only a fallback for the brief moment before the first real read
   arrives, or if Firebase is temporarily unreachable — it is never treated
   as a substitute for a fresh read. */
const cache = { settings: null, orders: null, menuAvailability: null };

async function getSettings(){
  if(!firebaseReady) return cache.settings || { groupBookingEnabled:true, queueCounter:0, cashEnabled:true };
  try{
    const snap = await db.ref('settings').once('value');
    const v = snap.val() || {};
    const s = {
      groupBookingEnabled: v.groupBookingEnabled !== undefined ? v.groupBookingEnabled : true,
      queueCounter: v.queueCounter || 0,
      cashEnabled: v.cashEnabled !== undefined ? v.cashEnabled : true
    };
    cache.settings = s;
    return s;
  }catch(e){
    return cache.settings || { groupBookingEnabled:true, queueCounter:0, cashEnabled:true };
  }
}
async function setGroupBookingEnabled(val){
  cache.settings = Object.assign({}, cache.settings, { groupBookingEnabled: val });
  if(!firebaseReady) return;
  try{ await db.ref('settings/groupBookingEnabled').set(val); }catch(e){ /* stays in cache for this session */ }
}
async function setCashEnabled(val){

async function getMenuAvailability(){

    const snap = await db.ref('menuAvailability').once('value');
    const v = snap.val() || {};
    cache.menuAvailability = v;

}
async function setMenuAvailability(itemId, available){
  if(!cache.menuAvailability) cache.menuAvailability = {};
  cache.menuAvailability[itemId] = available;
  if(!firebaseReady) return;
  try{ await db.ref('menuAvailability/' + itemId).set(available); }catch(e){ /* stays in cache for this session */ }
}
function isMenuItemAvailable(availability, itemId){
  return availability[itemId] !== false; // default: available unless explicitly marked false
}
async function getAllOrders(){
  if(!firebaseReady) return cache.orders || {};
  try{
    const snap = await db.ref('orders').once('value');
    const o = snap.val() || {};
    cache.orders = o;
    return o;
  }catch(e){
    return cache.orders || {};
  }
}
/* Writes ONLY this one order's own node (orders/{id}), never the whole
   orders tree. This is what keeps simultaneous orders from different
   customers safe: each order lives at its own path, so two people placing
   orders at the same second can never overwrite each other's data. */
async function saveOrder(order){
  if(!cache.orders) cache.orders = {};
  cache.orders[order.id] = order;
  if(!firebaseReady) return;
  try{ await db.ref('orders/' + order.id).set(order); }catch(e){ /* stays in cache for this session */ }
}
/* Partial update to just the given fields of one order (e.g. only
   kitchenStatus, or only paymentStatus) — safer still than rewriting the
   whole order when only a small part of it changed. */
async function updateOrderFields(orderId, fields){
  if(cache.orders && cache.orders[orderId]) Object.assign(cache.orders[orderId], fields);
  if(!firebaseReady) return;
  try{ await db.ref('orders/' + orderId).update(fields); }catch(e){ /* stays in cache for this session */ }
}
async function nextQueueNumber(){
  if(!firebaseReady){
    const s = await getSettings();
    let n = (s.queueCounter||0) + 1;
    if(n>999) n = 1;
    s.queueCounter = n;
    cache.settings = s;
    return String(n).padStart(3,'0');
  }
  try{
    const result = await db.ref('settings/queueCounter').transaction(cur=>{
      let n = (cur||0) + 1;
      if(n > 999) n = 1;
      return n;
    });
    const n = result.snapshot.val();
    return String(n).padStart(3,'0');
  }catch(e){
    return String(Math.floor(Math.random()*900)+100);
  }
}

/* ============ UTILS ============ */
function rupiah(n){ return "Rp " + n.toLocaleString('id-ID'); }
function distanceMeters(lat1, lon1, lat2, lon2){
  const R = 6371000, toRad = d => d * Math.PI/180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function mapsLink(){ return `https://www.google.com/maps?q=${RESTO.lat},${RESTO.lng}`; }
function resizeImageFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxW = 640;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.65));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function timeStr(ts){
  const d = new Date(ts);
  return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(str){
  return (str||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============ ROUTING ON LOAD ============ */
function parseEntryHash(){
  const h = location.hash.replace('#','');
  let intendedView = null;

  if(/^meja\d+$/.test(h)){
    const n = h.replace('meja','');
    state.order = newDraftOrder('dinein', 'Meja ' + n);
    intendedView = 'menu';
  } else if(h === 'takeaway'){
    state.order = newDraftOrder('takeaway', null);
    intendedView = 'menu';
  } else if(h === 'group'){
    state.order = newDraftOrder('group', null);
    intendedView = 'groupSize';
  } else if(h === 'dapur'){
    state.view = isDapurUnlocked() ? 'kitchen' : 'pinDapur'; return;
  } else if(h === 'kasir'){
    state.view = isKasirUnlocked() ? 'cashier' : 'pinKasir'; return;
  } else if(h === 'staff'){
    state.view = 'home'; return;
  } else {
    intendedView = 'beranda';
  }

  const profile = getCustomerProfile();
  if(!profile || !profile.name || !profile.phone){
    state.pendingView = intendedView;
    state.view = 'onboarding';
    return;
  }
  if(!hasSeenStory()){
    state.pendingView = intendedView;
    state.view = 'story';
    return;
  }
  state.view = intendedView;
}

/* ============ KITCHEN NOTIFICATION SOUND ============ */
function playNotifSound(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    function tone(freq, start, dur, vol){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now+start);
      gain.gain.linearRampToValueAtTime(vol, now+start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now+start+dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now+start); osc.stop(now+start+dur+0.05);
    }
    tone(880, 0, 0.18, 0.4);
    tone(1175, 0.15, 0.32, 0.4);
  }catch(e){ /* audio not available/allowed — ignore */ }
}
let kitchenKnownOrders = {};
let kitchenSoundPrimed = false;
function checkKitchenSound(orders){
  let shouldRing = false;
  Object.values(orders).forEach(o=>{
    const prev = kitchenKnownOrders[o.id];
    if(!prev){
      if(kitchenSoundPrimed) shouldRing = true;
    } else if((o.addonAt||0) > (prev.addonAt||0)){
      shouldRing = true;
    }
    kitchenKnownOrders[o.id] = { addonAt: o.addonAt||0 };
  });
  kitchenSoundPrimed = true;
  if(shouldRing) playNotifSound();
}

function generateQRCodes(){
  const base = location.origin + location.pathname;
  for(let i=1;i<=TABLE_COUNT;i++){
    const el = document.getElementById('qrcell-meja'+i);
    if(el && !el.dataset.rendered){
      new QRCode(el, { text: base+'#meja'+i, width:90, height:90 });
      el.dataset.rendered = '1';
      el.innerHTML += `<b>Meja ${i}</b>`;
    }
  }
  const t = document.getElementById('qrcell-takeaway');
  if(t && !t.dataset.rendered){ new QRCode(t, {text: base+'#takeaway', width:90, height:90}); t.dataset.rendered='1'; t.innerHTML += '<b>Take Away</b>'; }
  const g = document.getElementById('qrcell-group');
  if(g && !g.dataset.rendered){ new QRCode(g, {text: base+'#group', width:90, height:90}); g.dataset.rendered='1'; g.innerHTML += '<b>Group Booking</b>'; }

/* ============ CAMERA QR SCANNER ============ */
let scanStream = null;
let scanRAF = null;
function stopScanCamera(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  scanRAF = null;
  if(scanStream){
    scanStream.getTracks().forEach(t=>t.stop());
    scanStream = null;
  }
}
async function startScanCamera(){
  const video = document.getElementById('scanVideo');
  const statusEl = document.getElementById('scanStatus');
  if(!video) return;
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = scanStream;
    await video.play();
    if(statusEl) statusEl.textContent = 'Arahkan kamera ke barcode meja...';
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    function tick(){
      if(!scanStream) return; // scanning was stopped (view changed)
      if(!video.videoWidth){ scanRAF = requestAnimationFrame(tick); return; }
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if(code && code.data){
        stopScanCamera();
        handleScannedText(code.data);
        return;
      }
      scanRAF = requestAnimationFrame(tick);
    }
    scanRAF = requestAnimationFrame(tick);
  }catch(e){
    if(statusEl) statusEl.textContent = 'Tidak bisa mengakses kamera. Coba pilih manual di bawah, atau izinkan akses kamera di pengaturan browser.';
  }
}
function handleScannedText(text){
  let hash = '';
  try{
    const url = new URL(text);
    hash = url.hash.replace('#','');
  }catch(e){
    hash = text.replace('#','');
  }
  location.hash = hash;
  parseEntryHash();
  render();
}

document.addEventListener('click', async (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action==='go'){ setView(el.dataset.view); return; }

  if(action==='switchAccount'){
    const ok = confirm('Ganti akun akan menghapus nama & nomor WA yang tersimpan di HP/perangkat ini. Lanjutkan?');
    if(!ok) return;
    try{ localStorage.removeItem('kmf_customer_profile'); }catch(e){ /* ignore */ }
    location.hash = '';
    parseEntryHash();
    render();
    return;
  }

  if(action==='enterDapur'){
    location.hash = 'dapur';
    parseEntryHash();
    render();
    return;
  }
  if(action==='enterKasir'){
    location.hash = 'kasir';
    parseEntryHash();
    render();
    return;
  }
  if(action==='submitPinDapur'){
    const pass = document.getElementById('pinDapurInput').value;
    const errEl = document.getElementById('pinDapurError');
    if(!pass){ if(errEl) errEl.textContent = 'Mohon isi kata sandi.'; return; }
    try{
      await auth.signInWithEmailAndPassword(DAPUR_EMAIL, pass);
      setView('kitchen');
    }catch(e){
      if(errEl) errEl.textContent = 'Kata sandi salah, atau akun Dapur belum dibuat di Firebase Console.';
    }
    return;
  }
  if(action==='submitPinKasir'){
    const pass = document.getElementById('pinKasirInput').value;
    const errEl = document.getElementById('pinKasirError');
    if(!pass){ if(errEl) errEl.textContent = 'Mohon isi kata sandi.'; return; }
    try{
      await auth.signInWithEmailAndPassword(KASIR_EMAIL, pass);
      setView('cashier');
    }catch(e){
      if(errEl) errEl.textContent = 'Kata sandi salah, atau akun Kasir belum dibuat di Firebase Console.';
    }
    return;
  }
  if(action==='logoutDapur'){
    if(auth) await auth.signOut();
    location.hash = 'staff';
    setView('home');
    return;
  }
  if(action==='logoutKasir'){
    if(auth) await auth.signOut();
    location.hash = 'staff';
    setView('home');
    return;
  }

  if(action==='saveOnboarding'){
    const name = document.getElementById('onbName').value.trim();
    const phone = document.getElementById('onbPhone').value.trim();
    if(!name){ alert('Mohon isi nama Anda.'); return; }
    if(!phone || phone.length<9){ alert('Mohon isi nomor WhatsApp yang valid.'); return; }
    saveCustomerProfile({name, phone});
    if(!hasSeenStory()){
      setView('story');
    } else {
      setView(state.pendingView || 'beranda');
    }
    return;
  }
  if(action==='continueFromStory'){
    markStorySeen();
    setView(state.pendingView || 'beranda');
    return;
  }
  if(action==='saveProfil'){
    const name = document.getElementById('profName').value.trim();
    const phone = document.getElementById('profPhone').value.trim();
    if(!name){ alert('Mohon isi nama Anda.'); return; }
    if(!phone || phone.length<9){ alert('Mohon isi nomor WhatsApp yang valid.'); return; }
    saveCustomerProfile({name, phone});
    alert('Profil berhasil disimpan.');
    setView('beranda'); return;
  }
  if(action==='viewRiwayatDetail'){
    const all = await getAllOrders();
    const o = all[el.dataset.id];
    if(o){ state.createdOrder = o; setView('status'); }
    return;
  }
  if(action==='sendNotif'){
    const textEl = document.getElementById('notifText');
    const message = textEl ? textEl.value.trim() : '';
    if(!message){ alert('Tulis dulu pesan notifikasinya.'); return; }
    if(firebaseReady){
      try{
        await db.ref('notifications').push({ message, createdAt: Date.now() });
        alert('Notifikasi terkirim ke semua pelanggan.');
        if(textEl) textEl.value = '';
        render();
      }catch(e){ alert('Gagal mengirim notifikasi. Coba lagi.'); }
    }
    return;
  }
  if(action==='printDailyReport'){
    const all = await getAllOrders();
    printDailyReport(all);
    return;
  }

  if(action==='scanTable'){
    location.hash = 'meja'+el.dataset.n;
    state.order = newDraftOrder('dinein', 'Meja '+el.dataset.n);
    setView('menu'); return;
  }
  if(action==='scanTakeaway'){
    location.hash = 'takeaway';
    state.order = newDraftOrder('takeaway', null);
    setView('menu'); return;
  }
  if(action==='scanGroup'){
    location.hash = 'group';
    state.order = newDraftOrder('group', null);
    setView('groupSize'); return;
  }
  if(action==='confirmGroupSize'){
    const val = parseInt(document.getElementById('groupSizeInput').value, 10);
    const bookingDate = document.getElementById('bookingDateInput').value;
    const bookingTime = document.getElementById('bookingTimeInput').value;
    if(!val || val < 10){ alert('Jumlah rombongan minimal 10 orang.'); return; }
    if(!bookingDate){ alert('Mohon isi tanggal booking.'); return; }
    if(!bookingTime){ alert('Mohon isi jam booking.'); return; }
    state.order.groupSize = val;
    state.order.bookingDate = bookingDate;
    state.order.bookingTime = bookingTime;
    setView('menu'); return;
  }
  if(action==='setCategory'){ state.category = el.dataset.cat; render(); return; }
  if(action==='qtyInc'){
    const id = el.dataset.id;
    const availability = await getMenuAvailability();
    if(!isMenuItemAvailable(availability, id)){ alert('Maaf, menu ini sedang habis.'); render(); return; }
    if(!state.order.items[id]) state.order.items[id] = {qty:0, note:''};
    state.order.items[id].qty++;
    render(); return;
  }
  if(action==='qtyDec'){
    const id = el.dataset.id;
    if(state.order.items[id]){
      state.order.items[id].qty--;
      if(state.order.items[id].qty<=0) delete state.order.items[id];
    }
    render(); return;
  }
  if(action==='submitInfo'){
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    if(!name){ alert('Mohon isi nama Anda.'); return; }
    if(!phone || phone.length<9){ alert('Mohon isi nomor WhatsApp yang valid.'); return; }
    state.order.customerName = name;
    state.order.customerPhone = phone;
    saveCustomerProfile({name, phone});
    setView('payment'); return;
  }
  if(action==='setMethod'){
    state.order.paymentMethod = el.dataset.m;
    state.geoResult = null; state.proofPreview = null;
    render(); return;
  }
  if(action==='setEwallet'){ state.order.ewalletProvider = el.dataset.p; render(); return; }
  if(action==='checkGeo'){
    state.geoChecking = true; render();
    if(!navigator.geolocation){
      state.geoResult = {ok:false, error:'Geolocation tidak didukung perangkat ini'};
      state.geoChecking = false; render(); return;
    }
    navigator.geolocation.getCurrentPosition(pos=>{
      const d = distanceMeters(pos.coords.latitude, pos.coords.longitude, RESTO.lat, RESTO.lng);
      state.geoResult = { ok: d <= GEOFENCE_TOLERANCE_M, distance: d };
      state.geoChecking = false; render();
    }, err=>{
      state.geoResult = {ok:false, error: err.message || 'Izin lokasi ditolak'};
      state.geoChecking = false; render();
    }, {enableHighAccuracy:true, timeout:12000});
    return;
  }
  if(action==='placeOrder'){
    if(!canSubmitOrder()) return;
    if(state.isSubmittingOrder) return; // guard against double-tap creating duplicate orders
    state.isSubmittingOrder = true;
    render();
    try{
      const o = state.order;
      const queueNumber = await nextQueueNumber();
      const id = 'ord_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      const total = cartTotal(o);
      const finalOrder = {
        id, queueNumber,
        orderType: o.orderType, tableCode: o.tableCode, groupSize: o.groupSize,
        bookingDate: o.bookingDate || null, bookingTime: o.bookingTime || null,
        items: o.items, total,
        customerName: o.customerName, customerPhone: o.customerPhone,
        paymentMethod: o.paymentMethod, ewalletProvider: o.ewalletProvider,
        paymentProof: state.proofPreview || null,
        paymentStatus: o.paymentMethod==='cash' ? 'belum_bayar' : 'menunggu',
        kitchenStatus: 'diterima',
        createdAt: Date.now()
      };
      await saveOrder(finalOrder);
      state.createdOrder = finalOrder;
      state.proofPreview = null;
      state.isSubmittingOrder = false;
      setView('confirm');
    }catch(e){
      state.isSubmittingOrder = false;
      alert('Gagal membuat pesanan, coba lagi.');
      render();
    }
    return;
  }
  if(action==='kitchenAdvance'){
    const all = await getAllOrders();
    const o = all[el.dataset.id];
    if(o){
      let newStatus = o.kitchenStatus;
      if(o.kitchenStatus==='diterima') newStatus='dimasak';
      else if(o.kitchenStatus==='dimasak') newStatus='selesai';
      await updateOrderFields(o.id, { kitchenStatus: newStatus, hasAddon: false });
    }
    render(); return;
  }
  if(action==='ackAddon'){
    await updateOrderFields(el.dataset.id, { hasAddon: false });
    render(); return;
  }
  if(action==='openAddon'){
    state.addonOrderId = el.dataset.id;
    state.addonItems = {};
    state.category = 'sterofom';
    setView('cashierAddItem');
    return;
  }
  if(action==='cancelAddon'){
    state.addonOrderId = null;
    state.addonItems = {};
    setView('cashier');
    return;
  }
  if(action==='addonQtyInc'){
    const id = el.dataset.id;
    const availability = await getMenuAvailability();
    if(!isMenuItemAvailable(availability, id)){ alert('Maaf, menu ini sedang habis.'); render(); return; }
    if(!state.addonItems[id]) state.addonItems[id] = { qty:0 };
    state.addonItems[id].qty++;
    render(); return;
  }
  if(action==='addonQtyDec'){
    const id = el.dataset.id;
    if(state.addonItems[id]){
      state.addonItems[id].qty--;
      if(state.addonItems[id].qty<=0) delete state.addonItems[id];
    }
    render(); return;
  }
  if(action==='confirmAddon'){
    const addonIds = Object.keys(state.addonItems);
    if(addonIds.length===0) return;
    const all = await getAllOrders();
    const o = all[state.addonOrderId];
    if(!o){ alert('Pesanan tidak ditemukan.'); setView('cashier'); return; }
    addonIds.forEach(id=>{
      if(o.items[id]) o.items[id].qty += state.addonItems[id].qty;
      else o.items[id] = { qty: state.addonItems[id].qty, note: '' };
    });
    o.total = cartTotal({ items: o.items });
    o.hasAddon = true;
    o.addonAt = Date.now();
    if(o.paymentMethod==='cash' && o.paymentStatus==='lunas') o.paymentStatus = 'belum_bayar';
    else if((o.paymentMethod==='transfer'||o.paymentMethod==='ewallet') && o.paymentStatus==='disetujui') o.paymentStatus = 'menunggu';
    await saveOrder(o);
    const queueNumber = o.queueNumber, newTotal = o.total;
    state.addonOrderId = null;
    state.addonItems = {};
    setView('cashier');
    alert('Item tambahan berhasil ditambahkan ke pesanan #'+queueNumber+'. Total baru: '+rupiah(newTotal));
    return;
  }
  if(action==='cashierTab'){ state.cashierTab = el.dataset.t; render(); return; }
  if(action==='cashierApprove'){
    const all = await getAllOrders();
    const o = all[el.dataset.id];
    if(o){
      await updateOrderFields(o.id, { paymentStatus: o.paymentMethod==='cash' ? 'lunas' : 'disetujui' });
    }
    render(); return;
  }
  if(action==='printReceipt'){
    const all = await getAllOrders();
    printReceiptFor(all[el.dataset.id]);
    return;
  }
  if(action==='printQR'){ window.print(); return; }
  if(action==='viewProof'){
    const all = await getAllOrders();
    const o = all[el.dataset.id];
    if(o && o.paymentProof){ state.lightbox = o.paymentProof; render(); }
    return;
  }
  if(action==='closeLightbox'){ state.lightbox = null; render(); return; }
  if(action==='ignoreClick'){ return; }
});

document.addEventListener('change', async (e)=>{
  if(e.target.id==='proofFileInput'){
    const file = e.target.files[0];
    if(file){
      const dataUrl = await resizeImageFile(file);
      state.proofPreview = dataUrl;
      render();
    }
  }
  if(e.target.id==='groupToggle'){
    await setGroupBookingEnabled(e.target.checked);
    render();
  }
  if(e.target.id==='cashToggle'){
    await setCashEnabled(e.target.checked);
    render();
  }
  if(e.target.dataset && e.target.dataset.action==='toggleStok'){
    await setMenuAvailability(e.target.dataset.id, e.target.checked);
    render();
  }
});

document.addEventListener('input', (e)=>{
  if(e.target.classList && e.target.classList.contains('note-input')){
    const id = e.target.dataset.id;
    if(state.order && state.order.items[id]){
      state.order.items[id].note = e.target.value;
    }
  }
});

/* ============ INIT ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{ /* ignore if unavailable */ });
  });
}

parseEntryHash();
render();

if(firebaseReady){
  auth.onAuthStateChanged((user)=>{
    currentAuthUser = user;
    authReady = true;
    const h = location.hash.replace('#','');
    // Re-evaluate dapur/kasir routing now that we know the real login state
    // (covers both: staff already logged in from before, and just logged out).
    if(h === 'dapur' || h === 'kasir' || state.view==='pinDapur' || state.view==='pinKasir' || state.view==='kitchen' || state.view==='cashier'){
      if(h === 'dapur' || h === 'kasir'){
        parseEntryHash();
        render();
      }
    }
  });
}

/* Real-time updates: whenever /orders or /settings changes in Firebase
   (from any device — customer, kitchen, or cashier), re-render the current
   live view automatically. Falls back to a light poll if Firebase isn't
   configured yet, so the app still works while you set that up. */
if(firebaseReady){
  db.ref('orders').on('value', ()=>{
    if(['status','kitchen','cashier','riwayat'].includes(state.view) && !state.lightbox) render();
  });
  db.ref('settings').on('value', ()=>{
    if(state.view==='groupSize' || (state.view==='cashier' && state.cashierTab==='settings')) render();
  });
  db.ref('notifications').on('value', ()=>{
    if(['beranda','notifikasi'].includes(state.view) && !state.lightbox) render();
  });
  db.ref('menuAvailability').on('value', ()=>{
    if(['menu','cashierAddItem'].includes(state.view) || (state.view==='cashier' && state.cashierTab==='stok')) render();
  });
} else {
  setInterval(()=>{
    if(['status','kitchen','cashier','riwayat','beranda'].includes(state.view) && !state.lightbox){
      render();
    }
  }, 4000);
}
</script>
</body>
</html>
